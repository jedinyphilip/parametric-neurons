<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parametric Neurons</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;600&display=swap');

  :root { 
    --accent: #00f2ff; 
    --bg: #010101; 
    --panel: rgba(10, 10, 10, 0.98); 
    --border: #1a1a1a; 
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    background: var(--bg); 
    color: #888; 
    font-family: 'Share Tech Mono', monospace; 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
  }

  #sidebar { 
    width: 460px; 
    background: var(--panel); 
    border-right: 1px solid var(--border); 
    display: flex; 
    flex-direction: column; 
    z-index: 100; 
    overflow-y: auto; 
    padding-bottom: 40px; 
    flex-shrink: 0;
  }

  header { 
    padding: 15px; 
    border-bottom: 1px solid var(--border); 
    text-align: center; 
  }

  header h1 { 
    font-family: 'Rajdhani', sans-serif; 
    letter-spacing: 0.25em; 
    text-transform: uppercase; 
    font-size: 1rem; 
    color: #fff; 
  }

  .section { 
    padding: 10px 18px; 
    border-bottom: 1px solid var(--border); 
  }

  .section h2 { 
    font-size: 0.5rem; 
    color: #555; 
    margin-bottom: 8px; 
    letter-spacing: 0.15em; 
    text-transform: uppercase; 
    border-left: 2px solid var(--accent); 
    padding-left: 8px; 
  }

  .ctrl { margin-bottom: 8px; }
  
  .ctrl label { 
    display: flex; 
    justify-content: space-between; 
    font-size: 0.52rem; 
    margin-bottom: 2px; 
    color: #888; 
    text-transform: uppercase; 
  }
  
  .ctrl label span { color: var(--accent); }

  input[type=range] { 
    -webkit-appearance: none; 
    width: 100%; 
    height: 2px; 
    background: #222; 
    outline: none; 
  }
  
  input[type=range]::-webkit-slider-thumb { 
    -webkit-appearance: none; 
    width: 8px; 
    height: 8px; 
    background: #fff; 
    border-radius: 50%; 
    cursor: pointer; 
  }

  .grid { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
  }

  .color-item { 
    display: flex; 
    align-items: center; 
    gap: 6px; 
    font-size: 0.5rem; 
  }
  
  input[type=color] { 
    border: 1px solid #333; 
    background: none; 
    width: 16px; 
    height: 16px; 
    cursor: pointer; 
    padding: 0; 
  }

  #main { 
    flex: 1; 
    position: relative; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    background: #000; 
  }
  
  canvas { 
    display: block; 
    box-shadow: 0 0 50px rgba(0,0,0,0.5); 
  }

  button { 
    width: 100%; 
    padding: 10px; 
    background: #080808; 
    border: 1px solid #222; 
    color: #fff; 
    font-family: inherit; 
    font-size: 0.6rem; 
    letter-spacing: 0.2em; 
    text-transform: uppercase; 
    cursor: pointer; 
    transition: 0.2s; 
    margin-top: 5px; 
  }
  
  button:hover { 
    border-color: var(--accent); 
    background: #111; 
  }
  
  #status { 
    position: absolute; 
    bottom: 10px; 
    left: 15px; 
    font-size: 0.5rem; 
    color: #333; 
    letter-spacing: 0.2em; 
  }
</style>
</head>
<body>

<aside id="sidebar">
  <header><h1>PARAMETRIC NEURONS</h1></header>

  <div class="section">

    <div class="ctrl">

            <label>Concentration <span id="v-obsC">5</span></label>

      <div class="ctrl"><label>Global Blur <span id="v-nBlur">1.2</span></label><input type="range" id="s-nBlur" min="0" max="20" step="0.2" value="1.2"></div>
    </div>

        <div class="ctrl"><label>S&P Noise <span id="v-nSp">2</span></label><input type="range" id="s-nSp" min="0" max="40" value="2"></div>

      <div class="color-item"><input type="color" id="c-line" value="#ffffff"> Soma Line</div>

<main id="main">
  <canvas id="canvas"></canvas>
  <div id="status">Made by Philip Jediny</div>

<script>
/** 
 * UNIFIED PERLIN NOISE ENGINE 
 */
const p = new Uint8Array(512);
const permutation = new Uint8Array(256);
for(let i=0; i<256; i++) permutation[i] = i;
// Shuffle
for(let i=255; i>0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [permutation[i], permutation[j]] = [permutation[j], permutation[i]];
}
for(let i=0; i<512; i++) p[i] = permutation[i % 256];

function getNoise(x, y, scale) {
    x *= scale; y *= scale;
    let X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    let xf = x - Math.floor(x), yf = y - Math.floor(y);
    const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
    const lerp = (t, a, b) => a + t * (b - a);
    const grad = (hash, x, y) => {
        const h = hash & 15;
        const u = h < 8 ? x : y, v = h < 4 ? y : h === 12 || h === 14 ? x : 0;
        return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
    };
    let u = fade(xf), v = fade(yf);
    let A = p[X]+Y, B = p[X+1]+Y;
    let res = (lerp(v, lerp(u, grad(p[A], xf, yf), grad(p[B], xf-1, yf)), 
                       lerp(u, grad(p[A+1], xf, yf-1), grad(p[B+1], xf-1, yf-1))) + 1) / 2;
    return Math.max(0, Math.min(1, res));
}

// Gaussian Random
function randn_bm() {
    let u = 0, v = 0;
    while(u === 0) u = Math.random();
    while(v === 0) v = Math.random();
    return Math.sqrt( -2.0 * Math.log( u ) ) * Math.cos( 2.0 * Math.PI * v );
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', {alpha: false});
const W = 800, H = 800;
canvas.width = W; canvas.height = H;

// Collision/Occupancy Grid
const occupancy = new Uint8Array(W * H);

// --- STATE SOURCE OF TRUTH ---
const P = {
  neuC: 3, 
  inter: 0.8, attract: 0.8, // Interaction / Attraction
  obsC: 5, obsM: 15, obsS: 5, obsChaos: 2.0,
  gReach: 1.0, taper: 1.0, 
  pAlpha: 0.5, brNoise: 0.6, pScale: 0.05, pInt: 1.5,
  majC: 3, majW: 4.5, majWR: 1.5, majWJ: 0.5, majPM: 1.0, majB: 0.2, majR: 400,
  minC: 6, minW: 1.8, minWR: 0.5, minWJ: 0.3, minPM: 1.0, minB: 0.2, minR: 150,
  somaR: 22, smooth: 12, hill: 0.8, nucS: 10, nucB: 0.8,
  bgScale: 0.02, bgInt: 0.15,
  nIso: 15, nBlur: 1.2, nSp: 2, glow: 20,
  colors: { fill: '#ffffff', line: '#ffffff', nuc: '#444444', bg: '#000000', bgColor: '#1a2a3a' }
};

// --- SYNC UI TO STATE ---
function setupUI() {
  Object.keys(P).forEach(key => {
      const s = document.getElementById('s-' + key);
      const v = document.getElementById('v-' + key);
      if (s && v) {
          s.value = P[key];
          v.textContent = P[key];
          s.oninput = () => {
              P[key] = parseFloat(s.value);
              v.textContent = s.value;
          };
      }
  });

  ['fill', 'line', 'nuc', 'bg', 'bgColor'].forEach(c => {
      const el = document.getElementById('c-' + c);
      if(el) {
          el.value = P.colors[c];
          el.oninput = (e) => P.colors[c] = e.target.value;
      }
  });

  document.getElementById('btn-gen').onclick = () => reset();
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// --- TIP SIMULATION ---
class Tip {
  constructor(x, y, angle, width, fuel, type) {
    this.x = x; this.y = y; this.angle = angle; this.type = type;
    this.fuel = fuel * P.gReach; 
    this.initialFuel = this.fuel;
    
    let r = type === 'major' ? P.majWR : P.minWR;
    this.width = width + (Math.random() - 0.5) * r;
    this.width = Math.max(0.2, this.width);
    
    this.active = true; 
    this.dist = 0;
  }

  update() {
    if (!this.active) return;
    
    // INTERACTION LOGIC
    let blocked = false;
    let attracted = false;
    
    const lookAhead = 8;
    const sx = Math.floor(this.x + Math.cos(this.angle) * lookAhead);
    const sy = Math.floor(this.y + Math.sin(this.angle) * lookAhead);
    
    // Check bounds only for occupancy to avoid crash
    // We do NOT stop if out of bounds (feature requirement)
    if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
        if (occupancy[sy * W + sx] > 0) blocked = true;
    }

    // TERMINAL ATTRACTION
    // If fuel is low (< 30%), try to find connection instead of avoiding
    if (this.fuel < this.initialFuel * 0.3 && P.attract > 0) {
        if (blocked) {
            // If blocked and attracting, steer TOWARDS it (simplify by not steering away)
            // Or wiggle towards center of mass? 
            // Simple implementation: Don't steer away, maybe steer slightly towards?
            // For now, just disabling the avoidance turn makes it "connect"
            attracted = true;
        } else {
            // Scan left/right to find something to grab
            // This is computationally expensive, simplified here:
            // If almost done, wiggle more to find friends
            this.angle += (Math.random()-0.5) * 0.5;
        }
    }

    // STANDARD AVOIDANCE
    if (blocked && !attracted && P.inter > 0) {
        const turnStr = P.inter * 1.5;
        this.angle += (Math.random() > 0.5 ? 1 : -1) * turnStr;
        this.fuel -= 5; 
    }

    const px = this.x, py = this.y;
    
    this.angle += (Math.random() - 0.5) * (this.type === 'major' ? 0.08 : 0.2);
    this.x += Math.cos(this.angle) * 2;
    this.y += Math.sin(this.angle) * 2;
    
    // Update Occupancy
    const ix = Math.floor(this.x), iy = Math.floor(this.y);
    if(ix>=0 && ix<W && iy>=0 && iy<H) {
        occupancy[iy*W + ix] = 1;
        if (this.width > 1) {
            occupancy[iy*W + (ix+1)] = 1;
            occupancy[iy*W + (ix-1)] = 1;
            if(iy+1<H) occupancy[(iy+1)*W + ix] = 1;
            if(iy-1>=0) occupancy[(iy-1)*W + ix] = 1;
        }
    }

    this.fuel -= 2; 
    this.dist += 2;
    this.width *= (1.0 - (0.005 * P.taper));

    if (this.fuel <= 0 || this.width < 0.2) { 
        this.active = false; 
        return; 
    }

    let jitter = (Math.random() - 0.5) * (this.type === 'major' ? P.majWJ : P.minWJ);
    let drawW = Math.max(0.1, this.width + jitter);

    // FIX: Enhanced Branch Texture (Perlin Multiplicative Mask)
    // Use high contrast based on brNoise slider
    let alpha = 0.5; // Base alpha
    if (P.brNoise > 0) {
        let nVal = getNoise(this.x, this.y, P.pScale);
        // Multiply by inverse noise modulated by intensity
        // if brNoise is 1.0, we want nVal to strictly control visibility
        let mask = 1.0 - (P.brNoise * (1.0 - nVal * P.pInt));
        alpha *= mask;
    }
    alpha = Math.max(0, Math.min(1, alpha));

    ctx.lineCap = 'round';
    ctx.lineWidth = drawW * 2.2;
    ctx.strokeStyle = hexToRgba(P.colors.fill, alpha);
    
    // REMOVED SECONDARY STROKE to fix transparency issue
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(this.x, this.y); ctx.stroke();
    
    let probBase = this.type === 'major' ? 0.008 : 0.03;
    let mult = this.type === 'major' ? P.majPM : P.minPM;
    let bias = this.type === 'major' ? P.majB : P.minB;
    
    let prob = probBase * mult;
    const distRatio = this.dist / this.initialFuel;
    
    if (bias > 0) prob *= Math.pow(distRatio + 0.1, bias * 4);
    else if (bias < 0) prob *= Math.pow(1.1 - distRatio, Math.abs(bias) * 4);

    if (Math.random() < prob && this.width > 1.0) {
      const split = 0.3 + Math.random() * 0.5;
      const dir = Math.random() > 0.5 ? 1 : -1;
      tips.push(new Tip(this.x, this.y, this.angle + split * dir, this.width * 0.75, this.fuel * 0.8 / P.gReach, this.type));
      this.angle -= split * 0.3 * dir;
    }
  }
}

function procShape(cx, cy, r, res, chaos, axonAs, hillMult) {
  let pts = [];
  for(let i=0; i<res; i++) {
    let a = (i/res) * Math.PI * 2;
    let rad = r;
    if(axonAs && axonAs.length > 0) {
        axonAs.forEach(aa => {
          let d = Math.abs(a - aa); 
          if (d > Math.PI) d = Math.PI*2 - d;
          rad += Math.exp(-Math.pow(d / 0.4, 2)) * r * hillMult;
        });
    }
    rad += Math.sin(a * 8) * r * 0.1 + (Math.random() - 0.5) * chaos;
    pts.push({x: cx + Math.cos(a)*rad, y: cy + Math.sin(a)*rad});
  }
  return pts;
}

function smooth(pts, res, iterations) {
  for(let s=0; s<iterations; s++) {
    for(let i=0; i<res; i++) {
      let p = pts[(i-1+res)%res], n = pts[(i+1)%res];
      pts[i].x = pts[i].x*0.6 + (p.x + n.x)*0.2;
      pts[i].y = pts[i].y*0.6 + (p.y + n.y)*0.2;
    }
  }
}

function fillShapeWithPerlin(ctxTarget, pts, colorHex, alphaMult = 1.0) {
    if(!pts || pts.length < 3) return;
    
    let minX=W, minY=H, maxX=0, maxY=0;
    pts.forEach(p => {
        if(p.x<minX) minX=p.x; if(p.x>maxX) maxX=p.x;
        if(p.y<minY) minY=p.y; if(p.y>maxY) maxY=p.y;
    });
    minX = Math.max(0, Math.floor(minX-10));
    minY = Math.max(0, Math.floor(minY-10));
    maxX = Math.min(W, Math.ceil(maxX+10));
    maxY = Math.min(H, Math.ceil(maxY+10));
    const w = maxX - minX; 
    const h = maxY - minY;
    if(w<=0 || h<=0) return;

    pts.forEach(p => {
        const ix=Math.floor(p.x), iy=Math.floor(p.y);
        if(ix>=0 && ix<W && iy>=0 && iy<H) occupancy[iy*W+ix] = 1;
    });

    const osc = document.createElement('canvas');
    osc.width = w; osc.height = h;
    const oCtx = osc.getContext('2d');

    oCtx.beginPath();
    oCtx.moveTo(pts[0].x - minX, pts[0].y - minY);
    pts.forEach(p => oCtx.lineTo(p.x - minX, p.y - minY));
    oCtx.closePath();
    oCtx.fillStyle = '#fff';
    oCtx.fill();

    oCtx.globalCompositeOperation = 'source-in';
    const id = oCtx.getImageData(0,0,w,h);
    const d = id.data;
    const r = parseInt(colorHex.slice(1,3), 16);
    const g = parseInt(colorHex.slice(3,5), 16);
    const b = parseInt(colorHex.slice(5,7), 16);

    for(let i=0; i<d.length; i+=4) {
        if(d[i+3] > 0) {
            const x = (i/4)%w + minX;
            const y = Math.floor((i/4)/w) + minY;
            
            if(x>=0 && x<W && y>=0 && y<H) occupancy[y*W+x] = 1;

            let nVal = getNoise(x, y, P.pScale);
            let a = 0.5 + (nVal - 0.5) * P.pInt * P.pAlpha;
            if(P.pAlpha === 0) a = 0.5;
            
            d[i] = r; d[i+1] = g; d[i+2] = b;
            d[i+3] = Math.min(255, Math.max(0, a * 255 * alphaMult));
        }
    }
    oCtx.putImageData(id, 0, 0);
    ctxTarget.drawImage(osc, minX, minY);
}

function drawBackground() {
    ctx.fillStyle = P.colors.bg;
    ctx.fillRect(0, 0, W, H);
    
    if (P.bgInt > 0) {
        const id = ctx.getImageData(0,0,W,H), d = id.data;
        const targetR = parseInt(P.colors.bgColor.slice(1,3), 16);
        const targetG = parseInt(P.colors.bgColor.slice(3,5), 16);
        const targetB = parseInt(P.colors.bgColor.slice(5,7), 16);
        
        for(let y=0; y<H; y++) {
            for(let x=0; x<W; x++) {
                const i = (y*W + x)*4;
                const n = getNoise(x, y, P.bgScale);
                const factor = n * P.bgInt;
                
                d[i] = d[i]*(1-factor) + targetR*factor;
                d[i+1] = d[i+1]*(1-factor) + targetG*factor;
                d[i+2] = d[i+2]*(1-factor) + targetB*factor;
            }
        }
        ctx.putImageData(id, 0, 0);
    }
}

function drawObstructions() {
    if(P.obsC <= 0) return;
    for(let i=0; i<P.obsC; i++) {
        let x = Math.random() * W;
        let y = Math.random() * H;
        let size = Math.abs(P.obsM + randn_bm() * P.obsS);
        size = Math.max(2, size);
        
        let pts = procShape(x, y, size, 40, P.obsChaos, [], 0);
        smooth(pts, 40, 3);
        fillShapeWithPerlin(ctx, pts, P.colors.fill, 0.4);
    }
}

function spawnNeuron(cx, cy) {
    const mA = Array.from({length:P.majC}, () => Math.random() * Math.PI * 2);
    const nA = Array.from({length:P.minC}, () => Math.random() * Math.PI * 2);

    let somaPts = procShape(cx, cy, P.somaR, 100, 5, mA, P.hill);
    smooth(somaPts, 100, P.smooth);

    ctx.shadowBlur = P.glow; 
    ctx.shadowColor = hexToRgba(P.colors.fill, 0.6);
    
    fillShapeWithPerlin(ctx, somaPts, P.colors.fill, 1.0);
    ctx.shadowBlur = 0;

    // SOMA OUTLINE (Soma Line Color)
    ctx.beginPath(); ctx.moveTo(somaPts[0].x, somaPts[0].y);
    somaPts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.strokeStyle = P.colors.line; 
    ctx.lineWidth = 1; 
    ctx.stroke();

    let nucPts = procShape(cx + (Math.random()-0.5)*5, cy + (Math.random()-0.5)*5, P.somaR * 0.4, 50, 2, [], 0);
    smooth(nucPts, 50, P.nucS);
    
    fillShapeWithPerlin(ctx, nucPts, P.colors.nuc, P.nucB);

    const spawn = (a) => {
        let idx = Math.floor((a/(Math.PI*2))*100)%100;
        return {x: somaPts[idx].x - Math.cos(a)*3, y: somaPts[idx].y - Math.sin(a)*3};
    };

    mA.forEach(a => tips.push(new Tip(spawn(a).x, spawn(a).y, a, P.majW, P.majR, 'major')));
    nA.forEach(a => tips.push(new Tip(spawn(a).x, spawn(a).y, a, P.minW, P.minR, 'minor')));
}

function reset() {
  active = false; 
  tips = [];
  ctx.filter = 'none'; 
  
  occupancy.fill(0); 

  drawBackground();
  drawObstructions();

  for(let i=0; i<P.neuC; i++) {
      let x, y;
      if (P.neuC === 1) {
          x = W/2; y = H/2;
      } else {
          x = 100 + Math.random() * (W - 200);
          y = 100 + Math.random() * (H - 200);
      }
      spawnNeuron(x, y);
  }
  
  active = true;
}

function post() {
  const id = ctx.getImageData(0,0,W,H), d = id.data;
  for(let i=0; i<d.length; i+=4) {
    if(P.nIso > 0) { 
        let n = (Math.random() - 0.5) * P.nIso; 
        d[i]+=n; d[i+1]+=n; d[i+2]+=n; 
    }
    if(P.nSp > 0 && Math.random() < P.nSp * 0.001) { 
        let c = Math.random() > 0.5 ? 255 : 0; 
        d[i]=d[i+1]=d[i+2]=c; 
    }
  }
  ctx.putImageData(id, 0, 0);

  if(P.nBlur > 0) {
    const t = document.createElement('canvas'); 
    t.width = W; t.height = H;
    t.getContext('2d').drawImage(canvas, 0, 0);
    
    ctx.save();
    ctx.fillStyle = P.colors.bg; 
    ctx.fillRect(0,0,W,H); 
    
    ctx.filter = `blur(${P.nBlur}px) contrast(1.05)`; 
    ctx.drawImage(t, 0, 0);
    ctx.restore();
  }
}

let tips = [], active = false;
function loop() {
  if (active) {
    let cur = tips.filter(t => t.active);
    if (cur.length > 0) { 
        for(let i=0; i<4; i++) tips.forEach(t => t.update()); 
    } else { 
        post(); 
        active = false; 
    }
  }
  requestAnimationFrame(loop);
}

setupUI();
reset();
loop();
</script>
